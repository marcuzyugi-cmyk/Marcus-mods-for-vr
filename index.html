<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Mods</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
    width:90%;
    max-width:700px;
}

.profile{
    width:180px;
    height:180px;
    border-radius:50%;
    border:4px solid white;
    object-fit:cover;
    margin-bottom:25px;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

.subtitle{
    color:#bfbfbf;
    font-size:1.2rem;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.button{
    display:block;
    text-decoration:none;
    color:white;
    background:#7a3cff;
    padding:18px;
    border-radius:15px;
    font-size:1.2rem;
    font-weight:bold;
    transition:0.25s ease;
}

.button:hover{
    background:#9b6cff;
    transform:translateY(-3px);
}

.cursor{
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}
</style>

</head>
<body>

<div class="container">

    <img src="Marcusss.png" class="profile" alt="Marcus Mods">

    <h1>
        <span id="typing"></span><span class="cursor">|</span>
    </h1>

    <p class="subtitle">Gorilla Tag Modding</p>

    <div class="buttons">
        <a href="downloads.html" class="button">⬇ Download</a>
        <a href="credits.html" class="button">★ Credits</a>
    </div>

</div>

<script>
const text = "Marcus Mods";
let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typing").textContent += text.charAt(i);
        i++;
        setTimeout(typeWriter, 120);
    }
}

window.onload = typeWriter;
</script>

</body>
</html>
