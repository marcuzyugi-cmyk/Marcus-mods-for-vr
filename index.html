<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Marcus Mods</title>

    <style>
        body {
            background: transparent;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        .logo {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid #8b5cff;
            box-shadow:
                0 0 10px #8b5cff,
                0 0 30px #8b5cff,
                0 0 50px #8b5cff;
            margin-top: 30px;
        }

        h1 {
            color: white;
            font-size: 45px;
            text-shadow: 0 0 15px #8b5cff;
        }

        .box {
            background: rgba(0, 0, 0, 0.65);
            border: 2px solid #8b5cff;
            border-radius: 15px;
            padding: 20px;
            margin: 25px auto;
            max-width: 500px;
            box-shadow: 0 0 20px #8b5cff;
        }

        h2 {
            color: #8b5cff;
        }

        p {
            color: white;
            font-size: 18px;
        }

        .button {
            display: inline-block;
            background: #8b5cff;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 10px;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 0 15px #8b5cff;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .button:hover {
            background: #a77cff;
        }

        .button:active {
            transform: scale(0.98);
        }

        footer {
            margin-top: 40px;
            color: #cccccc;
        }

        .status-message {
            display: none;
            color: #8b5cff;
            font-size: 14px;
            margin-top: 10px;
        }

        .status-message.show {
            display: block;
        }
    </style>
</head>

<body>

    <video autoplay muted loop id="background-video">
        <source src="images/background.mp4" type="video/mp4">
    </video>

    <audio id="background-music" loop preload="auto">
        <source src="images/music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <button class="button" id="music-button" onclick="toggleMusic()">
        Start Music
    </button>

    <div class="status-message" id="status-message"></div>

    <img src="images/marcusss.png" alt="Marcus Mods Logo" class="logo">

    <h1>Marcus Mods</h1>

    <div class="box">
        <h2>Welcome</h2>
        <p>
            Welcome to Marcus Mods!
            Find downloads and information about our mods here.
        </p>
    </div>

    <div class="box">
        <h2>Pages</h2>

        <a class="button" href="downloads.html">
            Downloads
        </a>

        <a class="button" href="credits.html">
            Credits
        </a>
    </div>

    <footer>
        Marcus Mods © 2026
    </footer>

    <script>
        let isPlaying = false;
        const music = document.getElementById("background-music");
        const button = document.getElementById("music-button");
        const statusMessage = document.getElementById("status-message");

        function toggleMusic() {
            try {
                if (isPlaying) {
                    music.pause();
                    button.textContent = "Start Music";
                    isPlaying = false;
                    statusMessage.classList.remove("show");
                } else {
                    music.volume = 0.5;
                    const playPromise = music.play();
                    
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            button.textContent = "Stop Music";
                            isPlaying = true;
                            statusMessage.classList.remove("show");
                        }).catch((error) => {
                            console.error("Playback failed:", error);
                            showStatus("Music playback failed. Check file path and browser permissions.");
                        });
                    }
                }
            } catch (error) {
                console.error("Error toggling music:", error);
                showStatus("Error: Unable to play audio");
            }
        }

        function showStatus(message) {
            statusMessage.textContent = message;
            statusMessage.classList.add("show");
            setTimeout(() => {
                statusMessage.classList.remove("show");
            }, 3000);
        }

        // Handle audio errors
        music.addEventListener("error", () => {
            console.error("Audio loading error:", music.error);
            showStatus("Could not load audio file");
        });

        music.addEventListener("ended", () => {
            isPlaying = false;
            button.textContent = "Start Music";
        });
    </script>

</body>
</html>
